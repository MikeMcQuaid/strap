# This file is synced from `MikeMcQuaid/.github`, do not modify it directly.
---
version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: weekly
    day: friday
    time: '08:00'
    timezone: Etc/UTC
  groups:
    bundler:
      patterns:
      - "*"
  allow:
  - dependency-type: all
  cooldown:
    default-days: 7
- package-ecosystem: docker
  directory: "/"
  schedule:
    interval: weekly
    day: friday
    time: '08:00'
    timezone: Etc/UTC
  groups:
    docker:
      patterns:
      - "*"
  allow:
  - dependency-type: all
  cooldown:
    default-days: 7
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
    day: friday
    time: '08:00'
    timezone: Etc/UTC
  groups:
    github-actions:
      patterns:
      - "*"
  allow:
  - dependency-type: all
  cooldown:
    default-days: 7
