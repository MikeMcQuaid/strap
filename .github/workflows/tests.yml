name: GitHub Actions CI

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash -xeuo pipefail {0}

permissions:
  contents: read

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false

      - name: Cache Homebrew prefix
        uses: Homebrew/actions/cache-homebrew-prefix@main
        with:
          brewfile: true
          uninstall: true

      - name: Set up Ruby
        uses: Homebrew/actions/setup-ruby@main
        with:
          bundler-cache: true

      - run: script/style
        env:
          # Used by zizmor
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rspec:
    runs-on: ubuntu-latest
    needs: style
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Homebrew
        id: setup-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false

      - name: Cache Homebrew prefix
        uses: Homebrew/actions/cache-homebrew-prefix@main
        with:
          brewfile: true
          uninstall: true

      - name: Set up Ruby
        uses: Homebrew/actions/setup-ruby@main
        with:
          bundler-cache: true

      - name: Build Tailwind CSS
        run: bin/rails tailwindcss:build

      - name: Run RSpec tests
        run: bin/rspec

  strap_sh:
    runs-on: macos-15
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cleanup macOS
        run: sudo rm -rf /opt/homebrew /Applications/Xcode.app /Library/Developer/CommandLineTools

      - run: bin/strap.sh
        env:
          STRAP_CI: 1
          STRAP_DEBUG: 1

      - name: Rerun bin/strap.sh
        run: bin/strap.sh
        env:
          STRAP_CI: 1

      - run: brew config

      - run: brew doctor

      - name: Test various brew installations
        run: |
          brew install --build-from-source --formula libfaketime
          brew install --cask orka
          brew install --formula xz

  docker:
    needs: [style, rspec]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set RUBY_VERSION
        run: echo RUBY_VERSION="$(cat .ruby-version)" >> "${GITHUB_ENV}"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Packages
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: mikemcquaid
          password: ${{ secrets.GITHUB_TOKEN }}

      # We don't give Dependabot access to tokens.
      - if: github.actor != 'dependabot[bot]'
        name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: mikemcquaid
          password: ${{ secrets.DOCKER_TOKEN }}

      # Dependabot doesn't have access to push to the GHCR cache
      - if: github.actor != 'dependabot[bot]'
        name: Set up Docker cache
        run: echo DOCKER_CACHE_TO="type=registry,ref=ghcr.io/mikemcquaid/strap:cache,mode=max" >> "${GITHUB_ENV}"

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            mikemcquaid/strap:latest
            mikemcquaid/strap:main
            mikemcquaid/strap:master
            ghcr.io/mikemcquaid/strap:latest
            ghcr.io/mikemcquaid/strap:main
            ghcr.io/mikemcquaid/strap:master
          cache-from: type=registry,ref=ghcr.io/mikemcquaid/strap:cache
          cache-to: ${{ env.DOCKER_CACHE_TO }}
          provenance: mode=max
          sbom: true
          build-args: |
            RUBY_VERSION=${{ env.RUBY_VERSION }}

  deployment:
    if: github.event_name != 'pull_request'
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://strap.mikemcquaid.com
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          token: ${{ secrets.DIGITAL_OCEAN_TOKEN }}

      - name: Deploy to DigitalOcean
        run: doctl apps create-deployment --wait 5b95141a-ccca-4466-8c8c-501c015fff10
